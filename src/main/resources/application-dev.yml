server:
  servlet:
    encoding:
      charset: utf-8
      force: true
  port: 8080

logging:
  level:
    root: INFO #모든 라이브러리는 INFO 이상만 출력
    com.tenco: DEBUG # 내 프로젝트는 DEBUG 이상 모두 출력

spring:
  mustache:
    servlet:
      # 머스태치 템플릿 엔진에서 request 객체와 세션 객체에 접근할 수 있도록 허용하는 설정 추가
      expose-session-attributes: false
      expose-request-attributes: false


  #데이터베이스 연결 설정 (MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/myblog?serverTimezone=Asia/Seoul
    username: root
    password: root
  #    driver-class-name: org.h2.Driver
  #    url: jdbc:h2:mem:test
  #    username: sa
  #    password:
  h2:
    console:
      enabled: true

  #      초기 데이터 설정
  sql:
    init:
      mode: always # 외부 DB(MySQL)에서도 실행되도록 설정
      data-locations:
        - classpath:db/data.sql

  jpa:
    # Open Session In View --> false 로 설정
    # true (기본 값) -> 뷰 렌더링 까지 DB 세션 유지 그래서 (LAZY 로딩 까지 가능)
    # false : 트랜잭션 종효시 DB 세션 종료 ( Controller , View LAZY 로딩 불가)
    # false 사용시 Service 에서 필요한 데이터를 모두 조회하고 응답시 DTO 설계 방식으로 내려준다
    open-in-view: false
    hibernate:
      # ddl-auto: create 애플리케이션 시작시 테이블 새로 생성
      # 기존 데이터는 모드 삭제됨 (개발용)
#      ddl-auto: update -> 테이블을 새로안만들고 컬럼 업데이트 기존 테이블 삭제 안함
      ddl-auto: create
    #SQL 쿼리를 콘솔에 출력 (개발용)
    show-sql: true
    properties:
      hibernate:
        # SQL 쿼리를 보기 좋게 포맷팅
        format_sql: true
        # N + 1 문제를 완화 하기위한 완충 장치 설정
        # 기본 WHERE 절에서 in 절(in 쿼리로 변경 해준다)
#        #-- where id = 1 ~ 3 까지 묶은것
        #    #select * from user_tb where id in(1,2,3);
#        쿼리수를 1개로 줄여준다 size 는 in 에 들어갈 갯수

        default_batch_fetch_size: 10
    # data.sql 파일을 하이버네티트 초기화 이후에 실행


    # data.sql 파일을 Hibernate 초기화 이후에 실행
    defer-datasource-initialization: true
